<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco dos Cria</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial, sans-serif;
background:#f1f5f9;
}

.top{
background:#0a4fff;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.saldo{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.actions{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.action-btn{
flex:1;
margin:5px;
padding:12px;
border-radius:15px;
border:none;
background:#0a4fff;
color:white;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
}

.virtual-card{
background:linear-gradient(135deg,#0044ff,#0088ff);
color:white;
padding:20px;
border-radius:20px;
margin-top:10px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="top">
<span>🔵 Banco dos Cria</span>
<span onclick="logout()" style="cursor:pointer;">Sair</span>
</div>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen">
<div class="card">
<h3>Entrar ou Criar Conta</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button class="action-btn" onclick="register()">Cadastrar</button>
<button class="action-btn" onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">

<div class="card">
<h4>Conta</h4>
<div class="saldo" id="saldo"></div>
<div class="actions">
<button class="action-btn" onclick="toggleSaldo()">👁️</button>
<button class="action-btn" onclick="receber()">+ Receber</button>
<button class="action-btn" onclick="enviar()">- Enviar</button>
</div>
<input id="valor" type="number" placeholder="Digite o valor">
</div>

<div class="card">
<h4>Caixinha</h4>
<p>Guardado: R$ <span id="caixa"></span></p>
<div class="actions">
<button class="action-btn" onclick="guardar()">Guardar 50</button>
<button class="action-btn" onclick="retirar()">Retirar 50</button>
</div>
</div>

<div class="card">
<h4>Cartão Virtual</h4>
<div class="virtual-card">
<p id="cardNumber"></p>
<p id="cardVal"></p>
<p id="cardCVV"></p>
</div>
</div>

<div class="card">
<h4>Histórico</h4>
<div id="historico"></div>
</div>

</div>

<script>
let currentUser=null;
let hide=false;

function getData(){
return JSON.parse(localStorage.getItem("bankData"))||{};
}

function saveData(data){
localStorage.setItem("bankData",JSON.stringify(data));
}

function register(){
let u=user.value;
let p=pass.value;
let data=getData();

if(!u||!p){alert("Preencha tudo!");return;}
if(data[u]){alert("Usuário já existe!");return;}

data[u]={
password:p,
saldo:1000,
caixa:0,
historico:[],
card:{
number:"4000 "+Math.floor(Math.random()*9000+1000)+" "+Math.floor(Math.random()*9000+1000)+" "+Math.floor(Math.random()*9000+1000),
val:"12/30",
cvv:Math.floor(Math.random()*900+100)
}
};

saveData(data);
alert("Conta criada!");
}

function login(){
let u=user.value;
let p=pass.value;
let data=getData();

if(data[u] && data[u].password===p){
currentUser=u;
loginScreen.classList.add("hidden");
appScreen.classList.remove("hidden");
update();
}else{
alert("Login inválido!");
}
}

function logout(){
location.reload();
}

function update(){
let data=getData();
let user=data[currentUser];

saldo.innerText=hide?"••••":"R$ "+user.saldo.toFixed(2);
caixa.innerText=user.caixa.toFixed(2);

cardNumber.innerText="Número: "+user.card.number;
cardVal.innerText="Validade: "+user.card.val;
cardCVV.innerText="CVV: "+user.card.cvv;

historico.innerHTML=user.historico.map(h=>"<p>"+h+"</p>").join("");
}

function enviar(){
let data=getData();
let user=data[currentUser];
let v=parseFloat(valor.value);
if(v>0 && v<=user.saldo){
user.saldo-=v;
user.historico.push("- R$ "+v);
saveData(data);
update();
}
}

function receber(){
let data=getData();
let user=data[currentUser];
let v=parseFloat(valor.value);
if(v>0){
user.saldo+=v;
user.historico.push("+ R$ "+v);
saveData(data);
update();
}
}

function guardar(){
let data=getData();
let user=data[currentUser];
if(user.saldo>=50){
user.saldo-=50;
user.caixa+=50;
user.historico.push("Guardou 50");
saveData(data);
update();
}
}

function retirar(){
let data=getData();
let user=data[currentUser];
if(user.caixa>=50){
user.caixa-=50;
user.saldo+=50;
user.historico.push("Retirou 50");
saveData(data);
update();
}
}

function toggleSaldo(){
hide=!hide;
update();
}
</script>

</body>
</html>

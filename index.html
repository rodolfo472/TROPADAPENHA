<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gelatina de Rodolfo IA (GPT 5-mini)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#ff6f91;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.chat{
width:350px;
height:500px;
background:white;
border-radius:15px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.topo{
background:#ff4f7a;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.mensagens{
flex:1;
padding:10px;
overflow-y:auto;
}

.msg{
margin:5px 0;
padding:10px;
border-radius:10px;
max-width:80%;
}

.user{
background:#ddd;
align-self:flex-end;
}

.bot{
background:#ffe0ea;
}

.input{
display:flex;
border-top:1px solid #ccc;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
padding:10px;
background:#ff6f91;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="chat">

<div class="topo">
🍧 Gelatina de Rodolfo IA
</div>

<div class="mensagens" id="chat"></div>

<div class="input">
<input id="texto" placeholder="Pergunte algo...">
<button onclick="enviar()">Enviar</button>
</div>

</div>

<script>

function enviar(){
let texto = document.getElementById("texto").value;

if(!texto) return;

addMsg(texto,"user");

responder(texto.toLowerCase());

document.getElementById("texto").value="";
}

function addMsg(txt,tipo){
let div = document.createElement("div");
div.className="msg "+tipo;
div.innerText=txt;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function responder(msg){

let resposta = "Não entendi 🤔, pode repetir?";

if(msg.includes("preço") || msg.includes("valor")){
resposta = "💰 Cada gelatina custa em média R$4, podendo ter promoções!";
}

else if(msg.includes("promoção")){
resposta = "🎁 Temos promoções em dias especiais! Fique de olho 👀";
}

else if(msg.includes("pedido") || msg.includes("comprar")){
resposta = "📦 Para pedir, escolha seu sabor e envie o pedido pelo site!";
}

else if(msg.includes("entrega")){
resposta = "🚚 Fazemos entrega na sua região! Informe sua rua no pedido.";
}

else if(msg.includes("onde") || msg.includes("local")){
resposta = "📍 Estamos em Piranhas - Alagoas!";
}

else if(msg.includes("nome")){
resposta = "🍧 Somos a Gelatina de Rodolfo IA (GPT 5-mini)!";
}

setTimeout(()=>{
addMsg(resposta,"bot");
},500);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gelatina de Rodolfo IA (GPT 5-mini)</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #334155;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: #1e293b;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<header>🍮 Gelatina de Rodolfo IA (GPT 5-mini)</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="input" placeholder="Pergunte qualquer coisa...">
    <button onclick="enviar()">Enviar</button>
</div>

<script>

// Mensagem inicial
window.onload = () => {
    addMsg("Olá! 👋 Eu sou a Gelatina de Rodolfo IA (GPT 5-mini) 🍮🤖\n\nSou uma IA avançada pronta para te ajudar com estudos, matemática, programação, ideias e muito mais!\n\n👉 Como posso te ajudar hoje?", "bot");
};

function addMsg(texto, classe) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg " + classe;
    div.innerText = texto;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// IA avançada
function responder(pergunta) {
    pergunta = pergunta.toLowerCase();

    // Matemática
    try {
        if (pergunta.match(/[0-9+\-*/().]/)) {
            let conta = pergunta.replace(/[^0-9+\-*/().]/g, "");
            let resultado = eval(conta);
            return "📊 Vamos resolver passo a passo:\n\n" +
                   conta + " = " + resultado + "\n\n✔️ Resultado final: " + resultado;
        }
    } catch {}

    // Programação
    if (pergunta.includes("html")) return "🌐 HTML cria sites.\nExemplo:\n<html>\n  <h1>Meu site</h1>\n</html>";
    if (pergunta.includes("css")) return "🎨 CSS deixa o site bonito.\nExemplo:\nbody { background: black; }";
    if (pergunta.includes("javascript")) return "⚡ JavaScript dá vida ao site.\nExemplo:\nalert('Olá!');";

    // Tradução simulada
    if (pergunta.startsWith("traduza")) {
        return "🌍 Tradução simulada (para real, precisa de API)";
    }

    // Jogos
    if (pergunta.includes("roblox")) return "🎮 Roblox é top! Posso te ajudar a criar scripts.";
    if (pergunta.includes("minecraft")) return "🧱 Minecraft é sobre construção e sobrevivência.";

    // Estudos
    if (pergunta.includes("história")) return "📜 História estuda o passado.";
    if (pergunta.includes("ciência")) return "🔬 Ciência explica o mundo.";
    if (pergunta.includes("matemática")) return "📊 Matemática envolve números e lógica.";

    // Ideias
    if (pergunta.includes("ideia")) return "💡 Ideia: criar um jogo com IA inteligente!";
    if (pergunta.includes("site")) return "🌐 Você pode criar um site de jogos, IA ou estudos!";

    // Ajuda geral
    if (pergunta.includes("ajuda")) return "Claro! Me diga o que você precisa 😄";

    return "🤖 Entendi!\n\nVou tentar te ajudar da melhor forma possível.\n\n👉 " + pergunta;
}

function enviar() {
    let input = document.getElementById("input");
    let texto = input.value;

    if (texto == "") return;

    addMsg(texto, "user");

    setTimeout(() => {
        let resposta = responder(texto);
        addMsg(resposta, "bot");
    }, 500);

    input.value = "";
}

</script>

</body>
</html>

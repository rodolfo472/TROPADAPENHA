<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco dos Cria</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#f1f5f9;
  overflow-x:hidden;
}

/* TOPO AZUL */
.topo{
  height:320px;
  background: linear-gradient(180deg, #0f4cff, #2a6bff);
  color:white;
  padding:20px;
  position:relative;
}

.menu{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:white;
}

.nome{
  margin-top:30px;
  font-size:18px;
}

.saldo{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

/* PARTE BRANCA */
.conteudo{
  background:white;
  margin-top:-90px;
  border-top-left-radius:30px;
  border-top-right-radius:30px;
  padding:20px;
  min-height:100vh;
}

/* BOTÕES REDONDOS */
.botoes{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  margin-bottom:25px;
}

.botao{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
}

.botao-circulo{
  width:65px;
  height:65px;
  background:#e6ecff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:6px;
  font-size:20px;
}

/* SEÇÕES */
.card{
  background:#f8fafc;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.card h3{
  font-size:16px;
  margin-bottom:5px;
}

.desc{
  font-size:13px;
  color:#555;
}

</style>
</head>
<body>

<div class="topo">
  <div class="menu">
    <div>☰</div>
    <div></div>
    <div class="avatar"></div>
  </div>

  <div class="nome">Olá, Rodolfo</div>
  <div class="saldo">R$ 5.000,00</div>
</div>

<div class="conteudo">

  <!-- BOTÕES -->
  <div class="botoes">

    <div class="botao">
      <div class="botao-circulo">💸</div>
      Pix
    </div>

    <div class="botao">
      <div class="botao-circulo">💳</div>
      Pagar
    </div>

    <div class="botao">
      <div class="botao-circulo">🔁</div>
      Transferir
    </div>

    <div class="botao">
      <div class="botao-circulo">🏦</div>
      Depositar
    </div>

  </div>

  <!-- PARTE QUE APARECE AO ROLAR -->

  <div class="card">
    <h3>Empréstimos</h3>
    <div class="desc">Até R$ 5.000 disponível para você</div>
  </div>

  <div class="card">
    <h3>Investimentos</h3>
    <div class="desc">Conheça nossas opções de investimento</div>
  </div>

  <div class="card">
    <h3>Seguro de vida</h3>
    <div class="desc">Proteção completa que cabe no bolso</div>
  </div>

  <div class="card">
    <h3>Descubra mais</h3>
    <div class="desc">Convide amigos e ganhe benefícios</div>
  </div>

</div>

</body>
</html>

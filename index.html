<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RodoBank</title>

<style>
*{box-sizing:border-box;}
body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
}

.top{
background:#820ad1;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:#820ad1;
color:white;
border:none;
font-weight:bold;
}

button:active{opacity:0.8;}

.hidden{display:none;}

.virtual-card{
background:linear-gradient(45deg,#5a00a0,#a020f0);
color:white;
padding:20px;
border-radius:20px;
margin-top:10px;
}

@media(min-width:900px){
.container{
margin-top:40px;
}
}
</style>
</head>

<body>

<div class="top">💜 RodoBank</div>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen">
<div class="card">
<h3>Entrar ou Criar Conta</h3>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="register()">Cadastrar</button>
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">

<div class="card">
<h3>Saldo</h3>
<h2 id="saldo"></h2>
<button onclick="toggleSaldo()">Mostrar/Esconder</button>
</div>

<div class="card">
<h3>Transferência</h3>
<input id="valor" type="number" placeholder="Valor">
<button onclick="enviar()">Enviar</button>
<button onclick="receber()">Receber</button>
</div>

<div class="card">
<h3>Caixinha</h3>
<p>Guardado: R$ <span id="caixa"></span></p>
<button onclick="guardar()">Guardar 50</button>
<button onclick="retirar()">Retirar 50</button>
</div>

<div class="card">
<h3>Cartão Virtual</h3>
<div class="virtual-card">
<p id="cardNumber"></p>
<p id="cardVal"></p>
<p id="cardCVV"></p>
</div>
</div>

<div class="card">
<h3>Histórico</h3>
<div id="historico"></div>
</div>

<div class="card">
<h3>Ranking de Usuários</h3>
<div id="ranking"></div>
</div>

<button onclick="logout()">Sair</button>

</div>

</div>

<script>
let currentUser=null;
let hide=false;

function getData(){
return JSON.parse(localStorage.getItem("bankData"))||{};
}

function saveData(data){
localStorage.setItem("bankData",JSON.stringify(data));
}

function register(){
let u=user.value;
let p=pass.value;
let data=getData();

if(!u||!p){alert("Preencha tudo!");return;}

if(data[u]){alert("Usuário já existe!");return;}

data[u]={
password:p,
saldo:1000,
caixa:0,
historico:[],
card:{
number:generateCard(),
val:"12/30",
cvv:Math.floor(Math.random()*900+100)
}
};

saveData(data);
alert("Conta criada!");
}

function login(){
let u=user.value;
let p=pass.value;
let data=getData();

if(data[u] && data[u].password===p){
currentUser=u;
loginScreen.classList.add("hidden");
appScreen.classList.remove("hidden");
update();
}else{
alert("Login inválido!");
}
}

function logout(){
location.reload();
}

function update(){
let data=getData();
let user=data[currentUser];

saldo.innerText=hide?"••••":"R$ "+user.saldo.toFixed(2);
caixa.innerText=user.caixa.toFixed(2);

cardNumber.innerText="Número: "+user.card.number;
cardVal.innerText="Validade: "+user.card.val;
cardCVV.innerText="CVV: "+user.card.cvv;

historico.innerHTML=user.historico.map(h=>"<p>"+h+"</p>").join("");

ranking.innerHTML=Object.keys(data)
.sort((a,b)=>data[b].saldo-data[a].saldo)
.map(name=>"<p>"+name+" - R$ "+data[name].saldo.toFixed(2)+"</p>")
.join("");
}

function enviar(){
let data=getData();
let user=data[currentUser];
let v=parseFloat(valor.value);
if(v>0 && v<=user.saldo){
user.saldo-=v;
user.historico.push("- R$ "+v);
saveData(data);
update();
}
}

function receber(){
let data=getData();
let user=data[currentUser];
let v=parseFloat(valor.value);
if(v>0){
user.saldo+=v;
user.historico.push("+ R$ "+v);
saveData(data);
update();
}
}

function guardar(){
let data=getData();
let user=data[currentUser];
if(user.saldo>=50){
user.saldo-=50;
user.caixa+=50;
user.historico.push("Guardou 50");
saveData(data);
update();
}
}

function retirar(){
let data=getData();
let user=data[currentUser];
if(user.caixa>=50){
user.caixa-=50;
user.saldo+=50;
user.historico.push("Retirou 50");
saveData(data);
update();
}
}

function toggleSaldo(){
hide=!hide;
update();
}

function generateCard(){
return "4"+Math.floor(Math.random()*1000000000000000);
}
</script>

</body>
</html>

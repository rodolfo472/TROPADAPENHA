<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco dos Cria</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#f1f5f9;
}

/* TOPO FIXO */
.topo{
  height:380px;
  background: linear-gradient(180deg, #0f4cff, #2a6bff);
  color:white;
  padding:25px;
}

.menu{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.avatar{
  width:45px;
  height:45px;
  border-radius:50%;
  background:white;
}

.nome{
  margin-top:40px;
  font-size:18px;
}

.saldo{
  font-size:32px;
  font-weight:bold;
  margin-top:10px;
}

/* CONTAINER BRANCO */
.conteudo{
  background:white;
  margin-top:-120px;
  border-top-left-radius:30px;
  border-top-right-radius:30px;
  padding:25px 20px 40px 20px;
  min-height:100vh;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
}

/* BOTÕES */
.botoes{
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

.botao{
  text-align:center;
  font-size:13px;
}

.botao-circulo{
  width:70px;
  height:70px;
  border-radius:50%;
  background:#e6ecff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  margin-bottom:8px;
}

/* CARDS */
.card{
  background:#f8fafc;
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
}

.card h3{
  font-size:16px;
  margin-bottom:6px;
}

.desc{
  font-size:13px;
  color:#555;
}

</style>
</head>
<body>

<div class="topo">
  <div class="menu">
    <div>☰</div>
    <div></div>
    <div class="avatar"></div>
  </div>

  <div class="nome">Olá, Rodolfo</div>
  <div class="saldo">R$ 5.000,00</div>
</div>

<div class="conteudo">

  <!-- BOTÕES PRIMEIRO -->
  <div class="botoes">
    <div class="botao">
      <div class="botao-circulo">💸</div>
      Pix
    </div>

    <div class="botao">
      <div class="botao-circulo">💳</div>
      Pagar
    </div>

    <div class="botao">
      <div class="botao-circulo">🔁</div>
      Transferir
    </div>

    <div class="botao">
      <div class="botao-circulo">🏦</div>
      Depositar
    </div>
  </div>

  <!-- APARECE DEPOIS AO ROLAR -->
  <div class="card">
    <h3>Empréstimos</h3>
    <div class="desc">Até R$ 5.000 disponível para você</div>
  </div>

  <div class="card">
    <h3>Investimentos</h3>
    <div class="desc">Conheça nossas opções</div>
  </div>

  <div class="card">
    <h3>Seguro de vida</h3>
    <div class="desc">Proteção completa</div>
  </div>

  <div class="card">
    <h3>Descubra mais</h3>
    <div class="desc">Convide amigos</div>
  </div>

</div>

</body>
</html>

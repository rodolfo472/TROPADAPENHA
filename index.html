<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mercadao do rodrigao saminny peidao</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  background:#020617;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container {
  padding:15px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  background:#6366f1;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  margin-top:5px;
}

.card {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.price {
  color:#22c55e;
}

.popup {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#020617;
  padding:20px;
  display:none;
}
</style>
</head>

<body>

<header>🔥 Marketplace Gamer</header>

<div class="container">

<h3>Criar anúncio</h3>

<input id="nome" placeholder="Nome do anúncio">
<input id="jogo" placeholder="Jogo (ex: Blox Fruits, Steal a Brainrot)">
<input id="preco" placeholder="Preço">
<input id="contato" placeholder="Contato (WhatsApp, Insta...)">

<button onclick="criar()">Publicar</button>

<h3>Anúncios</h3>
<div id="lista"></div>

</div>

<div class="popup" id="popup">
  <h3>Contato</h3>
  <p id="info"></p>
  <button onclick="fechar()">Fechar</button>
</div>

<script>
let anuncios = JSON.parse(localStorage.getItem("anuncios")) || [];

function salvar(){
  localStorage.setItem("anuncios", JSON.stringify(anuncios));
}

function criar(){
  const nome = document.getElementById("nome").value;
  const jogo = document.getElementById("jogo").value;
  const preco = document.getElementById("preco").value;
  const contato = document.getElementById("contato").value;

  const novo = {nome, jogo, preco, contato};
  anuncios.push(novo);

  salvar();
  mostrar();
}

function mostrar(){
  let html = "";

  anuncios.forEach(a => {
    html += `
      <div class="card">
        <b>${a.nome}</b><br>
        ${a.jogo}<br>
        <span class="price">${a.preco}</span><br>
        <button onclick="negociar('${a.contato}')">Negociar</button>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function negociar(contato){
  document.getElementById("popup").style.display = "block";
  document.getElementById("info").innerText = contato;
}

function fechar(){
  document.getElementById("popup").style.display = "none";
}

mostrar();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RodoBank</title>

<style>
body{
margin:0;
font-family:Arial;
background:#820ad1;
color:white;
}

.screen{
display:none;
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

input,button{
padding:10px;
margin:5px 0;
width:100%;
border-radius:10px;
border:none;
}

button{
background:#820ad1;
color:white;
font-weight:bold;
}

h2{
margin-top:0;
}

.virtual-card{
background:linear-gradient(45deg,#5a00a0,#a020f0);
color:white;
padding:20px;
border-radius:20px;
margin-top:15px;
}

.small-btn{
width:auto;
padding:8px 12px;
margin:5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
<h2>💜 RodoBank</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="register()">Cadastrar</button>
<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="screen">

<h2>Conta</h2>

<div class="card">
Saldo:
<h1 id="saldo"></h1>
<button class="small-btn" onclick="toggleSaldo()">👁️</button>
</div>

<div class="card">
<h3>Transferência</h3>
<input id="valor" type="number" placeholder="Valor">
<button onclick="enviar()">Enviar</button>
<button onclick="receber()">Receber</button>
</div>

<div class="card">
<h3>Caixinha</h3>
<p>Guardado: R$ <span id="caixa"></span></p>
<button onclick="guardar()">Guardar 50</button>
<button onclick="retirar()">Retirar 50</button>
</div>

<div class="card">
<h3>Cartão Virtual</h3>
<div class="virtual-card">
<p id="cardNumber"></p>
<p id="cardVal"></p>
<p id="cardCVV"></p>
</div>
</div>

<div class="card">
<h3>Histórico</h3>
<div id="historico"></div>
</div>

<div class="card">
<h3>Ranking Amigos</h3>
<div id="ranking"></div>
</div>

<button onclick="logout()">Sair</button>

</div>

<script>
let currentUser=null;
let hide=false;

function saveData(data){
localStorage.setItem("bankData",JSON.stringify(data));
}

function loadData(){
return JSON.parse(localStorage.getItem("bankData"))||{};
}

function register(){
let u=user.value;
let p=pass.value;
let data=loadData();
if(data[u]){
alert("Usuário já existe");
return;
}
data[u]={
password:p,
saldo:1000,
caixa:0,
historico:[],
card:{
number:generateCard(),
val:"12/30",
cvv:Math.floor(Math.random()*900+100)
}
};
saveData(data);
alert("Conta criada!");
}

function login(){
let u=user.value;
let p=pass.value;
let data=loadData();
if(data[u]&&data[u].password===p){
currentUser=u;
showApp();
}else{
alert("Login inválido");
}
}

function showApp(){
login.style.display="none";
app.style.display="block";
update();
}

function logout(){
location.reload();
}

function update(){
let data=loadData();
let user=data[currentUser];
saldo.innerText=hide?"••••":"R$ "+user.saldo.toFixed(2);
caixa.innerText=user.caixa.toFixed(2);
cardNumber.innerText="Número: "+user.card.number;
cardVal.innerText="Validade: "+user.card.val;
cardCVV.innerText="CVV: "+user.card.cvv;

historico.innerHTML=user.historico.map(h=>"<p>"+h+"</p>").join("");

ranking.innerHTML=Object.keys(data).map(name=>{
return "<p>"+name+" - R$ "+data[name].saldo.toFixed(2)+"</p>";
}).join("");
}

function enviar(){
let data=loadData();
let user=data[currentUser];
let v=parseFloat(valor.value);
if(v>0&&v<=user.saldo){
user.saldo-=v;
user.historico.push("- R$ "+v);
saveData(data);
update();
}
}

function receber(){
let data=loadData();
let user=data[currentUser];
let v=parseFloat(valor.value);
if(v>0){
user.saldo+=v;
user.historico.push("+ R$ "+v);
saveData(data);
update();
}
}

function guardar(){
let data=loadData();
let user=data[currentUser];
if(user.saldo>=50){
user.saldo-=50;
user.caixa+=50;
user.historico.push("Guardou 50");
saveData(data);
update();
}
}

function retirar(){
let data=loadData();
let user=data[currentUser];
if(user.caixa>=50){
user.caixa-=50;
user.saldo+=50;
user.historico.push("Retirou 50");
saveData(data);
update();
}
}

function toggleSaldo(){
hide=!hide;
update();
}

function generateCard(){
return "4"+Math.floor(Math.random()*1000000000000000);
}

login.style.display="block";
</script>

</body>
</html>

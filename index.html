<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco dos Cria</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#f2f2f2;
  overflow-x:hidden;
}

/* PARTE DE CIMA */
.topo{
  height:300px;
  background: linear-gradient(180deg, #5a2df0, #7b3cff);
  color:white;
  padding:20px;
  position:relative;
}

.menu{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:white;
}

.saldo-box{
  margin-top:20px;
}

.saldo{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

/* PARTE BRANCA QUE SOBE */
.conteudo{
  background:white;
  margin-top:-80px;
  border-top-left-radius:25px;
  border-top-right-radius:25px;
  padding:20px;
  min-height:100vh;
}

.botoes{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.botao{
  width:65px;
  height:65px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  text-align:center;
}
</style>
</head>
<body>

<div class="topo">
  <div class="menu">
    <div>☰</div>
    <div>Banco dos Cria</div>
    <div class="avatar"></div>
  </div>

  <div class="saldo-box">
    <div>Saldo disponível</div>
    <div class="saldo">R$ 5.000,00</div>
  </div>
</div>

<div class="conteudo">

  <div class="botoes">
    <div class="botao">PIX</div>
    <div class="botao">Pagar</div>
    <div class="botao">Transferir</div>
    <div class="botao">Depositar</div>
  </div>

</div>

</body>
</html>
